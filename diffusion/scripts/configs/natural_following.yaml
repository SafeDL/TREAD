# ============================================================
# Naturalistic action diffusion prior - car-following
# ============================================================

paths:
  raw_dir: "../../../highD-dataset/Matlab/data"
  events_csv: "../../../data/highd_events/events.csv"
  output_dir: "../../../data/diffusion_natural/following"

event:
  event_type: "following"

sampling:
  target_fps: 25

context:
  history_steps: 12

generation:
  horizon_steps: 50

dataset:
  rebuild: false
  stride: 5
  train_stride: 5
  val_stride: 25
  test_stride: 25
  max_windows_per_event: 12
  min_current_gap: 0.5
  sampling_strategy: "event_balanced"

action:
  source: "smoothed_velocity_diff"
  representation: "jerk"
  smoothing:
    method: "savgol"
    window: 9
    polyorder: 2
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0

filters:
  max_abs_accel: 8.0
  max_abs_jerk: 30.0
  max_position_jump: 5.0
  min_vehicle_speed: 0.0

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.10

loss:
  x0_weight: 0.10
  smooth_weight: 0.01

diffusion:
  steps: 100

training:
  seed: 42
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 80
  grad_clip: 1.0
  log_every_epochs: 10
  num_workers: 0
  device: "auto"
  tensorboard: true

evaluation:
  split: "val"
  max_samples: 512
  plot_dir: "natural_prior_plots"
  seed: 42
