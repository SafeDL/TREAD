# ============================================================
# EVT-conditioned action diffusion - car-following first pass
# ============================================================

paths:
  raw_dir: "../../../highD-dataset/Matlab/data"
  events_csv: "../../../data/highd_events/events.csv"
  output_dir: "../../../data/diffusion/following"

event:
  event_type: "following"

sampling:
  target_fps: 25

context:
  history_steps: 12       # o_t uses the previous 0.48 s at 25 Hz

generation:
  horizon_steps: 50       # H = 2.0 s at 25 Hz

dataset:
  rebuild: true           # rebuild once after schema/action-risk changes; set false to reuse
  stride: 5               # fallback stride
  train_stride: 5
  val_stride: 25
  test_stride: 25
  max_windows_per_event: 12
  min_current_gap: 0.5

action:
  source: "smoothed_velocity_diff"
  representation: "jerk"  # acceleration / jerk
  smoothing:
    method: "savgol"
    window: 9
    polyorder: 2
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0

filters:
  max_abs_accel: 8.0
  max_abs_jerk: 30.0
  max_position_jump: 5.0
  min_vehicle_speed: 0.0

risk:
  ego_future_mode: "constant_velocity"  # highd_future / constant_velocity / constant_acceleration
  epsilon: 1.0e-6
  max_ttc_clip: 1000.0
  max_thw_clip: 200.0
  ttc_weight: 1.0
  thw_weight: 0.5
  drac_weight: 1.0
  softmax_lambda: 10.0
  collision_risk: 100.0

risk_condition:
  transform: "log1p_and_percentile"

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.10
  risk_dropout_prob: 0.10

loss:
  x0_weight: 0.10
  smooth_weight: 0.01

diffusion:
  steps: 100

training:
  seed: 42
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 80
  grad_clip: 1.0
  risk_stratified_sampling: true
  risk_sampling_bins: [0.50, 0.80, 0.90, 0.95, 0.99]
  log_every_epochs: 10
  num_workers: 0
  device: "auto"
  tensorboard: true

evaluation:
  split: "val"
  max_samples: 64
  monotonic_samples: 16
  risk_percentile_levels: [0.50, 0.80, 0.90, 0.95]
  guidance_scale: 1.0
  seed: 42
