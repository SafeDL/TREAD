# ============================================================
# DeepEVT - cut-in 配置
# ============================================================

paths:
  raw_dir: "../../../highD-dataset/Matlab/data"  # 原始的highD数据路径
  events_csv: "../../../data/highd_events/events.csv"  # 第一阶段筛选出来的驾驶事件列表
  output_dir: "../../../data/deepevt/cut_in"  # DeepEVT处理后的数据输出路径

event:
  event_type: "cut_in"

sampling:
  source_fps: 25
  target_fps: 25
  window_length: 128
  pre_anchor_steps: 64
  post_anchor_steps: 63

prefix:
  prefix_steps: 1         # current-scene: cut-in 默认仍使用单帧模式

risk:
  epsilon: 1.0e-6
  max_ttc_clip: 1000.0
  max_thw_clip: 200.0
  ttc_weight: 1.0
  thw_weight: 0.5
  drac_weight: 1.0
  softmax_lambda: 10.0

features:
  normalize: true
  use_prefix_encoder: true
  use_context_features: true
  forbid_risk_leakage: true

splits:
  strategy: "recording"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

robustness:
  output_root: "../../../data/deepevt/cut_in_protocols"
  repeated_recording:
    seeds: [11, 22, 33, 44, 55]
  leave_location_out:
    auto: true
    test_location_ids: []

model:
  hidden_dim: 128
  fusion_hidden_dim: 128
  num_transformer_layers: 2
  num_attention_heads: 4
  dropout: 0.1
  use_interaction_token: true
  direct_quantile_initial_base: 0.75
  direct_quantile_initial_increments: [0.12, 0.23]

training:
  alpha_u: 0.85
  quantile_levels: [0.85, 0.90, 0.95]
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  epochs: 50
  grad_clip: 5.0
  log_every_epochs: 20
  num_workers: 0
  pin_memory: false
  device: "auto"
  tensorboard: true

loss_weights:
  lambda_q: 1.0
  lambda_cal: 2.0
  lambda_rank: 0.05
  rank_temperature: 0.2
  rank_max_pairs: 4096
  cal_delta: 0.05

evaluation: {}
