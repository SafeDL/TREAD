# ============================================================
# DeepEVT - car-following 配置
# 默认相对 configs 所在目录解析 paths.*
# ============================================================

paths:
  raw_dir: "../../../highD-dataset/Matlab/data"  # 原始的highD数据路径
  events_csv: "../../../data/highd_events/events.csv"  # 第一阶段筛选出来的驾驶事件列表
  output_dir: "../../../data/deepevt/following"  # DeepEVT处理后的数据输出路径

event:
  event_type: "following"

sampling:
  source_fps: 25
  target_fps: 25
  window_length: 128
  pre_anchor_steps: 64
  post_anchor_steps: 63

prefix:
  prefix_steps: 12        # DeepEVT observes the first 12 event frames only.

risk_target:
  mode: "future_after_prefix"
  event_start_key: "start_frame"
  event_end_key: "end_frame"
  include_prefix_end_frame: false
  min_future_steps: 5

risk:
  epsilon: 1.0e-6
  max_ttc_clip: 1000.0
  max_thw_clip: 200.0
  ttc_weight: 1.0
  thw_weight: 0.5
  drac_weight: 1.0
  softmax_lambda: 10.0

features:
  normalize: true
  use_prefix_encoder: true
  use_context_features: true
  forbid_risk_leakage: true

splits:
  strategy: "recording"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

robustness:
  output_root: "../../../data/deepevt/following_protocols"
  repeated_recording:
    seeds: [11, 22, 33, 44, 55]
  leave_location_out:
    # When auto is true, one fold is generated for every highD locationId
    # represented in the available event set.
    auto: true
    test_location_ids: []

model:
  hidden_dim: 192
  fusion_hidden_dim: 192
  num_transformer_layers: 3
  num_attention_heads: 4
  dropout: 0.15
  use_interaction_token: true
  direct_quantile_initial_base: 0.75
  direct_quantile_initial_increments: [0.12, 0.23]

training:
  alpha_u: 0.85
  quantile_levels: [0.85, 0.90, 0.95]
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-5
  epochs: 120
  grad_clip: 5.0
  log_every_epochs: 20
  num_workers: 8
  pin_memory: false   # 对于小数据集，设置为 false 可能更快
  device: "cuda"            # auto / cpu / cuda
  tensorboard: true
  checkpoint_selection:
    # Validation-only checkpoint criterion from deepevt_selection_score_goal.md.
    # Raw ECE is still logged; selection uses rolling-median ECE for stability.
    w_loss: 1.0
    w_ece85: 1.0
    w_ece90: 2.0
    w_ece95: 4.0
    w_bin: 0.5
    w_rank: 0.0
    ece_smoothing_window: 5
    prefix_bin_feature: "gap_current"
    prefix_bin_count: 5
    prefix_bin_min_samples: 10

loss_weights:
  lambda_q: 1.0
  lambda_cal: 20.0
  lambda_rank: 0.05
  rank_temperature: 0.2
  rank_max_pairs: 4096
  cal_delta: 0.02
  selection_q_ece_weight: 10.0

evaluation: {}
