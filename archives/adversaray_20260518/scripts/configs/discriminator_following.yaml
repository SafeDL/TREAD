# Stage 2 naturalness discriminator - adversaray car-following

paths:
  natural_dataset_dir: "../../../data/diffusion_natural/following"
  diffusion_checkpoint: "../../../data/diffusion_natural/following/checkpoints/best_noise_mse.pt"
  output_dir: "../../../data/adversaray/following/discriminator"
  rss_over_guided_negatives: ""

event:
  event_type: "following"

sampling:
  target_fps: 25

action:
  source: "smoothed_velocity_diff"
  representation: "jerk"
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0

data:
  rebuild: false
  history_steps: 12
  horizon_steps: 50
  positives:
    highd_real: true
    clean_diffusion_weak_positive: false
  negatives:
    random_perturb: true
    rule_brake: true
    rss_over_guided: true
  negatives_per_positive: 3
  rss_over_guided_copies_per_positive: 1
  rss_hard_negative_steps: 12
  rss_hard_negative_step_size: 0.25
  rss_hard_negative_phy_weight: 0.05
  split_strategy: "inherit"
  lane_width: 3.5

rss:
  response_time: 1.0
  ego_max_accel: 2.0
  ego_min_brake: 4.0
  lead_max_brake: 6.0
  temperature: 1.0

physics:
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0
  speed_min: 0.0

future_features:
  include_action: true
  include_acceleration: true
  include_velocity: true
  include_displacement: true
  include_gap_proxy: true
  nominal_ego_mode: "constant_velocity"

model:
  hidden_dim: 128
  history_encoder: "gru"
  future_encoder: "gru"
  dropout: 0.10
  use_summary_features: true

training:
  seed: 42
  batch_size: 256
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 80
  grad_clip: 1.0
  positive_label_smoothing: 0.9
  source_balanced_sampling: true
  early_stopping_patience: 10
  log_every_epochs: 5
  num_workers: 0
  device: "auto"
  tensorboard: true

evaluation:
  split: "test"
  plot_dir: "discriminator_plots"
  source_wise_metrics: true
  calibration: true
  seed: 42

