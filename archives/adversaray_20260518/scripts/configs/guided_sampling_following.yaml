# Stage 3 guided denoising and rolling actor - adversaray car-following

paths:
  natural_dataset_dir: "../../../data/diffusion_natural/following"
  diffusion_checkpoint: "../../../data/diffusion_natural/following/checkpoints/best_noise_mse.pt"
  discriminator_checkpoint: "../../../data/adversaray/following/discriminator/checkpoints/best_auc.pt"
  output_dir: "../../../data/adversaray/following/guided_sampling"

guided_denoising:
  enabled: true
  guidance_start_ratio: 0.2
  guidance_end_ratio: 0.8
  lambda_rss: 1.0
  lambda_nat: 0.5
  lambda_phy: 0.5
  grad_clip_norm: 1.0
  update_target: "x_t"

rss:
  response_time: 1.0
  ego_max_accel: 2.0
  ego_min_brake: 4.0
  lead_max_brake: 6.0
  temperature: 1.0
  pool_beta: 8.0

physics:
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0
  speed_min: 0.0

rolling_actor:
  enabled: true
  plan_horizon_steps: 50
  commit_steps_max: 5
  step_mode: "closed_loop_per_frame"
  replan_on_invalid_plan: true

training:
  device: "auto"
