# ============================================================
# TREAD highD 第一阶段：尾部风险交互事件数据集构建器 — 默认配置
# ============================================================

paths:
  # highD 原始数据目录 (包含 XX_tracks.csv / XX_tracksMeta.csv / XX_recordingMeta.csv)
  raw_dir: "../../../highD-dataset/Matlab/data"
  # 输出目录
  output_dir: "../../../data"

recordings:
  include: "all"        # "all" 或 recording_id 列表，如 [1, 2, 3]
  exclude: []           # 排除的 recording_id 列表

sampling:
  source_fps: 25
  target_fps: 25
  window_length: 128        # 128 / 25 = 5.12s
  pre_anchor_steps: 64      # 2.56s before anchor
  post_anchor_steps: 63     # 2.52s after anchor

filters:  # 片段的语义筛选
  min_segment_seconds: 5.12
  max_abs_accel: 8.0
  max_abs_jerk: 30.0
  max_position_jump: 5.0
  min_positive_gap: 0.5
  max_ttc_clip: 1000.0
  max_thw_clip: 200.0
  min_vehicle_speed: 0.0

cutin:
  min_lane_stable_steps: 10          # 0.4 s at 25 Hz
  lateral_velocity_threshold: 0.10
  max_post_cutin_gap: 120.0
  min_post_cutin_duration_steps: 25  # 1.0 s after cut-in
  require_immediate_leader: true     # target must be ego's nearest front vehicle after cross
  anchor_mode: "cross"               # options: cross, end, risk

following:
  min_same_preceding_steps: 128      # stable following for at least 5.12s
  anchor_mode: "center"              # options: min_ttc, max_drac, risk, center

risk:
  epsilon: 1.0e-6
  ttc_weight: 1.0
  thw_weight: 0.5
  drac_weight: 1.0
  softmax_lambda: 10.0
  tail_quantiles: [0.90, 0.95, 0.99]

splits:
  strategy: "recording"   # options: recording, location_if_available
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

output:
  save_csv: true
  save_h5: true
  save_figures: true
  max_examples_per_type: 20
