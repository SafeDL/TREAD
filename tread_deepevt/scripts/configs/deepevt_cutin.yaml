# ============================================================
# DeepEVT - cut-in 配置
# ============================================================

paths:
  raw_dir: "../../../highD-dataset/Matlab/data"  # 原始的highD数据路径
  events_csv: "../../../data/events.csv"  # 筛选出来的驾驶事件列表
  output_dir: "../../../data/deepevt/cut_in"  # DeepEVT处理后的数据输出路径

event:
  event_type: "cut_in"

sampling:
  source_fps: 25
  target_fps: 25
  window_length: 128
  pre_anchor_steps: 64
  post_anchor_steps: 63

prefix:
  prefix_steps: 1         # initial-context: 仅 t=0，保证与 diffusion / MATLAB 闭环

risk:
  epsilon: 1.0e-6
  max_ttc_clip: 1000.0
  max_thw_clip: 200.0
  ttc_weight: 1.0
  thw_weight: 0.5
  drac_weight: 1.0
  softmax_lambda: 10.0

features:
  normalize: true
  use_prefix_encoder: true
  use_context_features: true
  forbid_risk_leakage: true

splits:
  strategy: "recording"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

model:
  hidden_dim: 128
  fusion_hidden_dim: 128
  num_transformer_layers: 2
  num_attention_heads: 4
  dropout: 0.1
  xi_min: -0.3
  xi_max: 0.5
  beta_min: 1.0e-4

training:
  alpha_u: 0.85
  use_exceedance_head: true
  tail_balanced_sampling: true
  tail_sampling_quantile: 0.85
  tail_sample_weight: 5.0
  batch_size: 256
  lr: 1.0e-3
  finetune_lr: 2.0e-4
  weight_decay: 1.0e-5
  pretrain_quantile_epochs: 50
  tail_train_epochs: 100
  finetune_epochs: 30
  grad_clip: 5.0
  num_workers: 0
  pin_memory: false
  device: "auto"
  tensorboard: true
  tensorboard_log_dir: null  # null => output_dir/runs
  eval_tail_levels: [0.90, 0.95]

loss_weights:
  lambda_q: 1.0
  lambda_exc: 0.2
  lambda_gpd: 1.0
  lambda_cal: 0.5
  lambda_support: 10.0
  lambda_u_unc: 0.05
  lambda_xi_reg: 0.10
  lambda_beta_reg: 0.02
  lambda_tail_unc: 0.02
  xi_prior: 0.0
  beta_ref: 1.0
  min_tail_log_scale: -1.5
  cal_delta: 0.05
