# Prior-regularized guided diffusion in closed-loop highway-env car-following

paths:
  natural_dataset_dir: "../../../data/diffusion_natural/following"
  diffusion_checkpoint: "../../../data/diffusion_natural/following/checkpoints/best_noise_mse.pt"
  policy_checkpoint: ""
  output_dir: "../../../data/adversaray/following/prior_guided"
  rss_config: "../../../data/adversaray/following/rss_calibration/recommended_rss_config.yaml"
  highd_events_csv: "../../../data/highd_events/events.csv"
  highd_raw_dir: "../../../highD_dataset/Matlab/data"
  highd_config: "../../../process_highD/scripts/configs/highd_default.yaml"

policy:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.05
  zero_init_output: true
  guidance_start_ratio: 0.2
  guidance_end_ratio: 0.8
  guidance_clip_norm: 1.0

env:
  episode_steps: 50
  commit_steps_max: 50
  lanes_count: 1
  speed_limit: 40.0
  ego_target_speed: 30.0
  initial_gap_min: 0.1
  skip_invalid_initial_context: true
  invalid_context_reward: 0.0
  reconstruct_highd_events: false

reward:
  collision_bonus: 3.0
  near_collision_weight: 1.0
  ttc_weight: 0.5
  ttc_target: 15.0
  gap_weight: 0.5
  gap_target: 30.0
  rss_weight: 3.0
  rss_scale: 20.0
  rss_risk_clip: 1.0
  hard_brake_weight: 0.0
  hard_brake_threshold: -4.0
  lead_physics_weight: 0.2
  invalid_collision_weight: 2.0
  near_collision_gap: 2.0
  naturalness_gate_enabled: true
  prior_kl_gate_metric: "prior_kl_per_plan"
  prior_kl_gate: 100.0
  physics_gate: 10.0
  jerk_violation_gate: 0.2

rss:
  response_time: 1.0
  ego_max_accel: 2.0
  ego_min_brake: 4.0
  lead_max_brake: 6.0
  temperature: 1.0
  pool_beta: 8.0

physics:
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0
  speed_min: 0.0

sampling:
  train_diffusion_steps: 100
  eval_diffusion_steps: 100
  allow_truncated_train_ddpm: false

training:
  seed: 42
  split: "train"
  val_split: "val"
  batch_size: 16
  epochs: 10
  max_train_contexts: 512
  context_sampling: "tail_mixture"
  tail_score_path: "../../../data/adversaray/following/prior_guided/context_tail_scores.npz"
  tail_fraction: 0.6
  random_fraction: 0.2
  stratified_fraction: 0.2
  tail_weight_temperature: 1.0
  tail_min_quantile: 0.90
  require_tail_scores: true
  resample_contexts_each_epoch: true
  batch_plan_sampling: true
  eval_contexts: 32
  eval_every_epochs: 5
  lr: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  lambda_prior: 0.1
  prior_kl_loss_metric: "prior_kl_per_plan"
  reward_clip: 0.0
  paired_prior_baseline: true
  paired_same_seed: true
  paired_reward_mode: "delta"
  paired_abs_weight: 0.05
  paired_abs_warmup_epochs: 3
  selection_alpha_prior_kl: 0.05
  selection_beta_physics: 0.1
  rollout_workers: 8
  baseline_ema_beta: 0.95
  log_every_epochs: 1
  device: "auto"
  tensorboard: true
