# ============================================================
# Stage 2 naturalness discriminator - car-following
# ============================================================

paths:
  natural_dataset_dir: "../../data/diffusion_natural/following"
  diffusion_checkpoint: "../../data/diffusion_natural/following/checkpoints/best_noise_mse.pt"
  output_dir: "../../data/diffusion_natural/following/discriminator"
  rss_over_guided_negatives: ""
  highway_env_hard_negatives: ""

event:
  event_type: "following"

sampling:
  target_fps: 25

action:
  source: "smoothed_velocity_diff"
  representation: "jerk"
  ax_min: -8.0
  ax_max: 4.0
  jerk_abs_max: 12.0

data:
  rebuild: false
  history_steps: 12
  horizon_steps: 50
  positive_source: "highd_real"
  negatives:
    random_perturb: true
    rule_brake: true
    diffusion_generated: false
    rss_over_guided: false
    highway_env_hard_negative: false
  negatives_per_positive: 3
  hard_negative_rounds: 2
  split_strategy: "inherit_from_natural_dataset"
  lane_width: 3.5

future_features:
  include_action: true
  include_acceleration: true
  include_velocity: true
  include_displacement: true
  include_gap_proxy: true
  nominal_ego_mode: "constant_velocity"

model:
  hidden_dim: 128
  history_encoder: "gru"
  future_encoder: "gru"
  dropout: 0.10
  use_summary_features: true

training:
  seed: 42
  batch_size: 256
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 80
  grad_clip: 1.0
  label_smoothing_positive: 0.9
  source_balanced_sampling: true
  early_stopping_patience: 10
  log_every_epochs: 5
  num_workers: 0
  device: "auto"
  tensorboard: true

evaluation:
  split: "test"
  plot_dir: "discriminator_plots"
  source_wise_metrics: true
  calibration: true
  seed: 42
